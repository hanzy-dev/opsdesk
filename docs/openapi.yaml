openapi: 3.0.3
info:
  title: OpsDesk API
  version: 0.1.0
  description: |
    OpenAPI specification for the current OpsDesk backend implementation.

    The API provides a simple serverless helpdesk workflow for:
    - health checks
    - authenticated identity lookup
    - ticket creation
    - ticket listing
    - ticket detail lookup
    - ticket ownership and assignment
    - ticket activity history
    - ticket status updates
    - ticket comments

    All timestamps are returned in UTC using RFC3339 / ISO 8601 format.
    RBAC is enforced from Cognito groups reporter, agent, and admin.

servers:
  - url: https://ezkjgr2we9.execute-api.ap-southeast-1.amazonaws.com/dev/v1
    description: Deployed API Gateway URL for the OpsDesk dev environment

tags:
  - name: System
  - name: Auth
  - name: Tickets

paths:
  /health:
    get:
      tags:
        - System
      summary: Check backend health
      operationId: getHealth
      responses:
        "200":
          description: Backend is reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSuccessResponse"
              example:
                data:
                  status: ok
                  env: dev

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get authenticated identity
      operationId: getAuthenticatedIdentity
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated identity returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthIdentitySuccessResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: invalid_token
                  message: authentication token is invalid or expired

  /tickets:
    get:
      tags:
        - Tickets
      summary: List tickets
      operationId: listTickets
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
          description: Optional server-side search across ticket ID, title, description, reporter, and assignee fields.
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/TicketStatus"
          description: Optional status filter.
        - in: query
          name: priority
          required: false
          schema:
            $ref: "#/components/schemas/TicketPriority"
          description: Optional priority filter.
        - in: query
          name: assignee
          required: false
          schema:
            type: string
            example: me
          description: Optional assignee filter. Supported values are `me`, `unassigned`, or a concrete assignee ID.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number, starting from 1.
        - in: query
          name: page_size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of tickets returned per page.
        - in: query
          name: sort_by
          required: false
          schema:
            type: string
            enum:
              - updated_at
              - created_at
              - priority
              - status
            default: updated_at
          description: Field used for server-side sorting.
        - in: query
          name: sort_order
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort direction for the selected field.
        - in: query
          name: assignedToMe
          required: false
          schema:
            type: boolean
          description: Backward-compatible alias for assignee=me.
      responses:
        "200":
          description: Ticket list returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketListSuccessResponse"
              example:
                data:
                  items:
                    - id: TCK-0002
                      title: API Gateway timeout
                      description: Investigate repeated timeout errors
                      status: in_progress
                      priority: high
                      createdBy: user-123
                      createdByName: Cloud Lab
                      createdByEmail: lab@example.com
                      reporterId: user-123
                      reporterName: Cloud Lab
                      reporterEmail: lab@example.com
                      assigneeId: agent-123
                      assigneeName: Support Engineer
                      assignedAt: "2026-04-14T09:10:00Z"
                      comments:
                        - id: CMT-0001
                          ticketId: TCK-0002
                          message: Initial triage started
                          authorName: Support Engineer
                          createdAt: "2026-04-14T09:15:00Z"
                          updatedAt: "2026-04-14T09:15:00Z"
                      createdAt: "2026-04-14T09:00:00Z"
                      updatedAt: "2026-04-14T09:15:00Z"
                  pagination:
                    page: 1
                    page_size: 10
                    total_items: 24
                    total_pages: 3
                    has_next: true
    post:
      tags:
        - Tickets
      summary: Create a ticket
      operationId: createTicket
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
            example:
              title: API Gateway timeout
              description: Investigate repeated timeout errors in the ticket service
              priority: high
              reporterName: Cloud Lab
              reporterEmail: lab@example.com
      responses:
        "201":
          description: Ticket created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSuccessResponse"
        "400":
          description: Invalid JSON or validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidJson:
                  value:
                    error:
                      code: invalid_json
                      message: request body must be valid JSON
                validationFailed:
                  value:
                    error:
                      code: validation_failed
                      message: request validation failed
                      details:
                        - field: priority
                          message: priority must be one of: low, medium, high
        "403":
          description: Authenticated but not allowed to create a ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}:
    get:
      tags:
        - Tickets
      summary: Get ticket detail
      operationId: getTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket detail returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSuccessResponse"
        "404":
          description: Ticket was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ticket_not_found
                  message: ticket not found
        "403":
          description: Authenticated but not allowed to view this ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}/status:
    patch:
      tags:
        - Tickets
      summary: Update ticket status
      operationId: updateTicketStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTicketStatusRequest"
            example:
              status: resolved
      responses:
        "200":
          description: Ticket status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSuccessResponse"
        "400":
          description: Invalid JSON or validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: validation_failed
                  message: request validation failed
                  details:
                    - field: status
                      message: status must be one of: open, in_progress, resolved
        "404":
          description: Ticket was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not allowed to update ticket status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}/assignment:
    patch:
      tags:
        - Tickets
      summary: Assign or reassign a ticket to the authenticated operator
      operationId: assignTicket
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTicketRequest"
            example: {}
      responses:
        "200":
          description: Ticket assignment updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketSuccessResponse"
        "403":
          description: Authenticated but not allowed to assign the ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ticket was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}/activities:
    get:
      tags:
        - Tickets
      summary: Get ticket activity history
      operationId: listTicketActivities
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      responses:
        "200":
          description: Ticket activity returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketActivityListSuccessResponse"
        "403":
          description: Authenticated but not allowed to view this ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Ticket was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tickets/{id}/comments:
    post:
      tags:
        - Tickets
      summary: Add a comment to a ticket
      operationId: addTicketComment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCommentRequest"
            example:
              message: Investigation has started
              authorName: Support Engineer
      responses:
        "201":
          description: Comment created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentSuccessResponse"
        "400":
          description: Invalid JSON or validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: validation_failed
                  message: request validation failed
                  details:
                    - field: message
                      message: message is required
        "404":
          description: Ticket was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated but not allowed to comment on this ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TicketId:
      in: path
      name: id
      required: true
      description: Ticket identifier.
      schema:
        type: string
        example: TCK-0001

  schemas:
    TicketStatus:
      type: string
      enum:
        - open
        - in_progress
        - resolved
      description: Allowed ticket status values.

    TicketPriority:
      type: string
      enum:
        - low
        - medium
        - high
      description: Allowed ticket priority values.

    Timestamp:
      type: string
      format: date-time
      description: UTC timestamp in RFC3339 / ISO 8601 format.
      example: "2026-04-14T09:00:00Z"

    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: status
        message:
          type: string
          example: status must be one of: open, in_progress, resolved

    ErrorBody:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
          example: request validation failed
        details:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    Health:
      type: object
      required:
        - status
        - env
      properties:
        status:
          type: string
          example: ok
        env:
          type: string
          example: dev

    AuthIdentity:
      type: object
      required:
        - subject
        - username
        - email
        - tokenUse
        - role
      properties:
        subject:
          type: string
          example: 9b0dc1d7-2f5c-40ff-97b5-0201ee2fe2a7
        username:
          type: string
          example: user@example.com
        email:
          type: string
          format: email
          example: user@example.com
        name:
          type: string
          example: OpsDesk User
        tokenUse:
          type: string
          example: id
        role:
          type: string
          enum:
            - reporter
            - agent
            - admin
        groups:
          type: array
          items:
            type: string

    Comment:
      type: object
      required:
        - id
        - ticketId
        - message
        - authorName
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: CMT-0001
        ticketId:
          type: string
          example: TCK-0001
        message:
          type: string
          example: Investigation has started
        authorName:
          type: string
          example: Support Engineer
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    TicketActivity:
      type: object
      required:
        - id
        - ticketId
        - action
        - summary
        - timestamp
      properties:
        id:
          type: string
          example: ACT-0001
        ticketId:
          type: string
          example: TCK-0001
        actorId:
          type: string
          example: user-123
        actorName:
          type: string
          example: OpsDesk User
        actorRole:
          type: string
          enum:
            - reporter
            - agent
            - admin
        action:
          type: string
          enum:
            - ticket_created
            - status_changed
            - comment_added
            - assignment_changed
        summary:
          type: string
          example: Status diubah
        metadata:
          type: object
          additionalProperties:
            type: string
        timestamp:
          $ref: "#/components/schemas/Timestamp"

    Ticket:
      type: object
      required:
        - id
        - title
        - description
        - status
        - priority
        - reporterName
        - reporterEmail
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          example: TCK-0001
        title:
          type: string
          example: API Gateway timeout
        description:
          type: string
          example: Investigate repeated timeout errors in the ticket service
        status:
          $ref: "#/components/schemas/TicketStatus"
        priority:
          $ref: "#/components/schemas/TicketPriority"
        createdBy:
          type: string
          example: user-123
        createdByName:
          type: string
          example: Cloud Lab
        createdByEmail:
          type: string
          format: email
          example: lab@example.com
        reporterId:
          type: string
          example: user-123
        reporterName:
          type: string
          example: Cloud Lab
        reporterEmail:
          type: string
          format: email
          example: lab@example.com
        assigneeId:
          type: string
          example: agent-123
        assigneeName:
          type: string
          example: Support Engineer
        assignedAt:
          $ref: "#/components/schemas/Timestamp"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    CreateTicketRequest:
      type: object
      required:
        - title
        - description
        - priority
        - reporterName
        - reporterEmail
      properties:
        title:
          type: string
          example: API Gateway timeout
        description:
          type: string
          example: Investigate repeated timeout errors in the ticket service
        priority:
          $ref: "#/components/schemas/TicketPriority"
        reporterName:
          type: string
          example: Cloud Lab
        reporterEmail:
          type: string
          format: email
          example: lab@example.com

    UpdateTicketStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/TicketStatus"

    AssignTicketRequest:
      type: object
      properties:
        assigneeId:
          type: string
          description: Reserved for future extension. Current implementation assigns to the authenticated operator.

    AddCommentRequest:
      type: object
      required:
        - message
        - authorName
      properties:
        message:
          type: string
          example: Investigation has started
        authorName:
          type: string
          example: Support Engineer

    HealthSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Health"

    AuthIdentitySuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/AuthIdentity"

    TicketSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Ticket"

    TicketListSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/TicketList"

    TicketList:
      type: object
      required:
        - items
        - pagination
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Ticket"
        pagination:
          $ref: "#/components/schemas/TicketListPagination"

    TicketListPagination:
      type: object
      required:
        - page
        - page_size
        - total_items
        - total_pages
        - has_next
      properties:
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 10
        total_items:
          type: integer
          example: 24
        total_pages:
          type: integer
          example: 3
        has_next:
          type: boolean
          example: true

    CommentSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Comment"

    TicketActivityListSuccessResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TicketActivity"
