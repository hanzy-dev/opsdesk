name: Security Baseline

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "15 2 * * 1"
  workflow_dispatch:

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  backend-vulnerability-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          check-latest: true
          cache-dependency-path: backend/go.sum

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend-dependency-audit:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://example.invalid/v1
      VITE_COGNITO_REGION: ap-southeast-1
      VITE_COGNITO_USER_POOL_ID: ap-southeast-1_ci
      VITE_COGNITO_CLIENT_ID: ci-client-id
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  zap-baseline:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Run ZAP baseline scan against frontend
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: https://opsdesk-teal.vercel.app
          cmd_options: "-a"
