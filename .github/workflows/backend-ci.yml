name: Backend CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          check-latest: true
          cache-dependency-path: backend/go.sum

      - name: Check gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run backend tests
        run: go test ./...

      - name: Build local backend binary
        run: go build ./cmd/local

      - name: Build lambda backend binary
        run: go build ./cmd/lambda
