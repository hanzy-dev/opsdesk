AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: OpsDesk serverless infrastructure foundation for AWS SAM.

Parameters:
  ProjectName:
    Type: String
    Default: opsdesk
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Project name prefix used in resource naming.

  StageName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Deployment stage name.

  AppEnv:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    Description: Backend application environment.

  ApiBasePath:
    Type: String
    Default: /v1
    Description: Base path expected by the backend router.

  FrontendOrigin:
    Type: String
    Default: https://opsdesk-teal.vercel.app
    Description: Allowed CORS origin for the deployed OpsDesk frontend.

  LogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warn
      - error
    Description: Backend log level.

Globals:
  Function:
    Architectures:
      - x86_64
    Timeout: 10
    MemorySize: 128
    Tracing: PassThrough
    Environment:
      Variables:
        APP_ENV: !Ref AppEnv
        API_BASE_PATH: !Ref ApiBasePath
        FRONTEND_ORIGIN: !Ref FrontendOrigin
        LOG_LEVEL: !Ref LogLevel
    Tags:
      Project: !Ref ProjectName
      Stage: !Ref StageName

Resources:
  OpsDeskUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-${StageName}-users"
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - Name: email
          AttributeDataType: String
          Mutable: true
          Required: true
      UserPoolTags:
        Project: !Ref ProjectName
        Stage: !Ref StageName

  OpsDeskUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${ProjectName}-${StageName}-web-client"
      UserPoolId: !Ref OpsDeskUserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: minutes
        IdToken: minutes
        RefreshToken: days
      AccessTokenValidity: 60
      IdTokenValidity: 60
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  OpsDeskReporterGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: reporter
      Description: Reporter role for internal ticket submitters.
      UserPoolId: !Ref OpsDeskUserPool

  OpsDeskAgentGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: agent
      Description: Agent role for operational ticket handling.
      UserPoolId: !Ref OpsDeskUserPool

  OpsDeskAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: Admin role with full OpsDesk access.
      UserPoolId: !Ref OpsDeskUserPool

  TicketsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${StageName}-tickets"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Stage
          Value: !Ref StageName

  ProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-${StageName}-profiles"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: subject
          AttributeType: S
      KeySchema:
        - AttributeName: subject
          KeyType: HASH
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Stage
          Value: !Ref StageName

  AttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-${StageName}-attachments-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Ref FrontendOrigin
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            ExposedHeaders:
              - ETag
            MaxAge: 300
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Stage
          Value: !Ref StageName

  OpsDeskHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref StageName
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        MaxAge: 300
      AccessLogSettings:
        DestinationArn: !GetAtt HttpApiAccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","requestTime":"$context.requestTime","httpMethod":"$context.httpMethod","routeKey":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength"}
      DefaultRouteSettings:
        DetailedMetricsEnabled: false

  BackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Description: OpsDesk Go backend Lambda entrypoint.
      Events:
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref OpsDeskHttpApi
            Path: /{proxy+}
            Method: ANY
            PayloadFormatVersion: "2.0"
        RootApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref OpsDeskHttpApi
            Path: /
            Method: ANY
            PayloadFormatVersion: "2.0"
      Environment:
        Variables:
          TICKET_TABLE_NAME: !Ref TicketsTable
          PROFILE_TABLE_NAME: !Ref ProfilesTable
          ATTACHMENT_BUCKET_NAME: !Ref AttachmentsBucket
          COGNITO_REGION: !Ref AWS::Region
          COGNITO_USER_POOL_ID: !Ref OpsDeskUserPool
          COGNITO_APP_CLIENT_ID: !Ref OpsDeskUserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TicketsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ProfilesTable
        - S3CrudPolicy:
            BucketName: !Ref AttachmentsBucket

    Metadata:
      DockerContext: ../backend
      Dockerfile: Dockerfile.lambda
      DockerTag: go1-al2023-v1

  BackendFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${BackendFunction}"
      RetentionInDays: 7

  HttpApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${ProjectName}-${StageName}-http-api"
      RetentionInDays: 7

Outputs:
  HttpApiUrl:
    Description: Base invoke URL for the HTTP API stage.
    Value: !Sub "https://${OpsDeskHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}"

  ApiBaseUrl:
    Description: Backend base URL including the configured API base path.
    Value: !Sub "https://${OpsDeskHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}${ApiBasePath}"

  BackendFunctionName:
    Description: Lambda function name for the backend.
    Value: !Ref BackendFunction

  TicketsTableName:
    Description: DynamoDB table name used by the backend.
    Value: !Ref TicketsTable

  AttachmentsBucketName:
    Description: Private S3 bucket name used for ticket attachments.
    Value: !Ref AttachmentsBucket

  ProfilesTableName:
    Description: DynamoDB table name used for persisted user profiles.
    Value: !Ref ProfilesTable

  SuggestedHealthEndpoint:
    Description: Health endpoint for post-deploy verification.
    Value: !Sub "https://${OpsDeskHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${StageName}/v1/health"

  CognitoUserPoolId:
    Description: Cognito User Pool ID for OpsDesk authentication.
    Value: !Ref OpsDeskUserPool

  CognitoUserPoolClientId:
    Description: Cognito User Pool app client ID for the frontend login flow.
    Value: !Ref OpsDeskUserPoolClient

  CognitoIssuerUrl:
    Description: Cognito issuer URL used by backend JWT verification.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${OpsDeskUserPool}"
